name: Keep Database Awake

on:
  schedule:
    # Runs every 12 hours (at minute 0 past hour 0 and 12)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub dashboard

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Ping MySQL Database
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DB: ${{ secrets.MYSQL_DB }}
        run: |
          sudo apt-get install -y mysql-client
          DB_PORT="${MYSQL_PORT:-3306}"
          mysql -h "$MYSQL_HOST" -P "$DB_PORT" -u "$MYSQL_USER" -p"$MYSQL_PASSWORD" "$MYSQL_DB" -e "SELECT 1;"
          echo "Successfully pinged database to keep it awake!"
